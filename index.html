<style id="dragon-mmo-style">
/* =========================================
   🐉 龙王传说 MVU 全息状态栏 (高阶视觉重构版)
   ========================================= */

:root {
  /* 核心色彩池 */
  --obsidian: #05070a;         /* 黑曜石底色 */
  --obsidian-light: #0d121a;   /* 亮曜石 */
  --dark-gold: #cba85a;        /* 威严暗金 (金龙王) */
  --dark-gold-glow: rgba(203, 168, 90, 0.5);
  --mythril: #d5ddf5;          /* 冷冽秘银 (银龙王) */
  --mythril-glow: rgba(213, 221, 245, 0.3);
  --holo-cyan: #00f3ff;        /* 全息幽蓝 (魂导科技) */
  --holo-cyan-glow: rgba(0, 243, 255, 0.5);
  --blood-red: #c93b4e;        /* 气血狂暴红 */
  --soul-purple: #9d73d6;      /* 精神渊紫 */
  
  --z-hud: 9999;
  --z-modal: 10000;
  
  font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
}

#dragon-mmo-root {
  position: fixed;
  bottom: 0; left: 0; width: 100vw; height: 0;
  z-index: 9999;
  color: var(--mythril);
  pointer-events: none; 
}
#dragon-mmo-root * {
  box-sizing: border-box;
  pointer-events: auto; 
}

/* =========================================
   ✨ 核心视觉组件库 (UI Components)
   ========================================= */

/* 1. 科技切角面板 (Tech Panel) */
.tech-panel {
  position: relative;
  background: rgba(10, 15, 26, 0.85);
  backdrop-filter: blur(10px);
  /* 机甲切角设计 */
  clip-path: polygon(0 15px, 15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%);
  border: 1px solid transparent;
  padding: 20px;
}
.tech-panel::before {
  content: '';
  position: absolute;
  inset: 0;
  padding: 1px;
  background: linear-gradient(135deg, var(--holo-cyan), transparent 40%, transparent 60%, var(--dark-gold));
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
}

/* 2. 古朴龙纹底纹 (Dragon Scale Background) */
.bg-dragon-scale {
  background-image: 
    linear-gradient(30deg, rgba(203, 168, 90, 0.03) 12%, transparent 12.5%, transparent 87%, rgba(203, 168, 90, 0.03) 87.5%, rgba(203, 168, 90, 0.03)),
    linear-gradient(150deg, rgba(203, 168, 90, 0.03) 12%, transparent 12.5%, transparent 87%, rgba(203, 168, 90, 0.03) 87.5%, rgba(203, 168, 90, 0.03)),
    linear-gradient(30deg, rgba(203, 168, 90, 0.03) 37%, transparent 37.5%, transparent 62%, rgba(203, 168, 90, 0.03) 62.5%, rgba(203, 168, 90, 0.03)),
    linear-gradient(150deg, rgba(203, 168, 90, 0.03) 37%, transparent 37.5%, transparent 62%, rgba(203, 168, 90, 0.03) 62.5%, rgba(203, 168, 90, 0.03));
  background-size: 40px 70px;
}

/* 3. 数据网格 (Data Grid) */
.data-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
}

/* 4. 信息卡片 (Info Card) */
.info-card {
  background: linear-gradient(180deg, rgba(20,25,35,0.6) 0%, rgba(10,15,20,0.8) 100%);
  border-top: 2px solid var(--holo-cyan);
  padding: 15px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 5px 15px rgba(0,0,0,0.5);
}
.info-card.gold { border-top-color: var(--dark-gold); }
.info-card.blood { border-top-color: var(--blood-red); }
.info-card.spirit { border-top-color: var(--soul-purple); }

.info-card::after {
  content: '';
  position: absolute;
  top: 0; right: 0; width: 50px; height: 50px;
  background: radial-gradient(circle, var(--holo-cyan-glow) 0%, transparent 70%);
  opacity: 0.2;
}
.info-card.gold::after { background: radial-gradient(circle, var(--dark-gold-glow) 0%, transparent 70%); }

.card-title {
  font-size: 16px;
  font-weight: 900;
  color: var(--mythril);
  margin-bottom: 15px;
  text-transform: uppercase;
  letter-spacing: 2px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-title::before {
  content: '';
  display: inline-block;
  width: 4px;
  height: 14px;
  background: var(--holo-cyan);
}
.info-card.gold .card-title::before { background: var(--dark-gold); }
.info-card.blood .card-title::before { background: var(--blood-red); }

/* 5. 键值对行 */
.card-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  font-size: 13px;
}
.card-row:last-child { border-bottom: none; }
.card-label { color: rgba(213, 221, 245, 0.6); }
.card-val {
  color: var(--holo-cyan);
  font-weight: bold;
  text-shadow: 0 0 5px rgba(0, 243, 255, 0.3);
}
.card-val.gold { color: var(--dark-gold); text-shadow: 0 0 5px var(--dark-gold-glow); }
.card-val.blood { color: var(--blood-red); text-shadow: 0 0 5px rgba(201, 59, 78, 0.5); }
.card-val.purple { color: var(--soul-purple); text-shadow: 0 0 5px rgba(157, 115, 214, 0.5); }

/* 6. 蜂窝物品栏 (Hexagon Inventory) */
.hex-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 10px 0;
}
.hex-item {
  position: relative;
  width: 60px;
  height: 68px;
  background: rgba(0, 243, 255, 0.05);
  clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  border: 1px solid var(--holo-cyan);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-size: 10px;
  color: var(--mythril);
  text-align: center;
  transition: all 0.3s;
  cursor: pointer;
}
.hex-item::after {
  content: '';
  position: absolute;
  inset: 2px;
  background: rgba(10, 15, 20, 0.9);
  clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  z-index: -1;
}
.hex-item:hover {
  background: var(--holo-cyan-glow);
  transform: translateY(-2px) scale(1.05);
}
.hex-item.legendary {
  background: rgba(203, 168, 90, 0.2);
  border-color: var(--dark-gold);
}
.hex-item.legendary:hover { background: var(--dark-gold-glow); }
.hex-count {
  color: var(--dark-gold);
  font-weight: bold;
  margin-top: 2px;
}

/* 7. 动态星轨魂环 (Soul Ring Orbit) */
.orbit-container {
  position: relative;
  width: 200px;
  height: 200px;
  margin: 20px auto;
  transform-style: preserve-3d;
  transform: perspective(800px) rotateX(60deg);
}
.orbit-center {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) rotateX(-60deg);
  width: 60px; height: 60px;
  background: radial-gradient(circle, var(--holo-cyan) 0%, transparent 70%);
  border-radius: 50%;
  box-shadow: 0 0 30px var(--holo-cyan-glow);
}
.orbit-ring {
  position: absolute;
  top: 50%; left: 50%;
  border-radius: 50%;
  border: 4px solid currentColor;
  box-shadow: 0 0 15px currentColor, inset 0 0 15px currentColor;
  opacity: 0.8;
  animation: spin linear infinite;
}
@keyframes spin {
  0% { transform: translate(-50%, -50%) rotate(0deg); }
  100% { transform: translate(-50%, -50%) rotate(360deg); }
}
/* 魂环年代颜色映射 */
.ring-white { color: #ffffff; }
.ring-yellow { color: #f2d878; }
.ring-purple { color: #c5aeff; }
.ring-black { color: #3a3f47; border-color: #1a1a1a; box-shadow: 0 0 15px #000, inset 0 0 15px #000; }
.ring-red { color: #ff3b5c; }
.ring-gold { color: #ffdf00; }

/* 8. 属性药片 (Chips) */
.chip-array {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.chip {
  padding: 4px 12px;
  background: rgba(203, 168, 90, 0.1);
  border: 1px solid rgba(203, 168, 90, 0.3);
  color: var(--dark-gold);
  border-radius: 2px;
  font-size: 12px;
  clip-path: polygon(5px 0, 100% 0, calc(100% - 5px) 100%, 0 100%);
}
.chip.tech { background: rgba(0,243,255,0.1); border-color: rgba(0,243,255,0.3); color: var(--holo-cyan); }
.chip.debuff { background: rgba(201, 59, 78, 0.1); border-color: rgba(201, 59, 78, 0.3); color: #ff8a9f; }

/* =========================================
   🎮 Level 0: 底部导航 HUD
   ========================================= */
#dragon-mmo-hud {
  position: absolute;
  bottom: 0; left: 0; width: 100%; height: 80px;
  background: linear-gradient(0deg, var(--obsidian) 30%, rgba(5,7,10,0.85) 100%);
  border-top: 2px solid rgba(0, 243, 255, 0.3);
  box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.9), inset 0 2px 0 rgba(255, 255, 255, 0.1);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 30px;
  z-index: var(--z-hud);
  backdrop-filter: blur(15px);
}
/* 扫描线动画 */
#dragon-mmo-hud::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--holo-cyan), transparent);
  animation: scanline 3s linear infinite;
}
@keyframes scanline { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

/* HUD 左侧 */
.hud-left {
  display: flex; align-items: center; gap: 20px; width: 30%;
}
.hud-avatar {
  width: 60px; height: 60px;
  background: linear-gradient(135deg, rgba(203,168,90,0.2), rgba(0,0,0,0.8));
  border: 2px solid var(--dark-gold);
  clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  box-shadow: 0 0 15px var(--dark-gold-glow);
  display: flex; justify-content: center; align-items: center;
  color: var(--dark-gold);
  position: relative;
}
.hud-avatar svg { width: 36px; height: 36px; fill: currentColor; }
.hud-bars { display: flex; flex-direction: column; gap: 6px; flex-grow: 1; }
.hud-bar-container {
  width: 100%; height: 6px; background: rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.1);
  clip-path: polygon(0 0, 100% 0, calc(100% - 4px) 100%, 0 100%);
}
.hud-bar-fill { height: 100%; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
.fill-vit { background: linear-gradient(90deg, #6A2030, var(--blood-red)); box-shadow: 0 0 10px var(--blood-red); }
.fill-sp { background: linear-gradient(90deg, #204761, var(--holo-cyan)); box-shadow: 0 0 10px var(--holo-cyan); }
.fill-men { background: linear-gradient(90deg, #4A396B, var(--soul-purple)); box-shadow: 0 0 10px var(--soul-purple); }

/* HUD 中央 */
.hud-center { display: flex; justify-content: center; align-items: center; gap: 20px; width: 40%; }
.context-btn {
  background: rgba(0, 243, 255, 0.05); border: 1px solid var(--holo-cyan); color: var(--holo-cyan);
  padding: 10px 30px; font-size: 15px; font-weight: bold; letter-spacing: 2px;
  clip-path: polygon(15px 0, 100% 0, calc(100% - 15px) 100%, 0 100%);
  cursor: pointer; transition: all 0.2s;
  text-shadow: 0 0 5px var(--holo-cyan-glow);
}
.context-btn:hover { background: rgba(0, 243, 255, 0.2); transform: translateY(-2px) scale(1.02); }
.context-btn:active { transform: translateY(1px); }
.context-btn.highlight { border-color: var(--dark-gold); color: var(--dark-gold); background: rgba(203, 168, 90, 0.1); text-shadow: 0 0 5px var(--dark-gold-glow); }
.context-btn.blood { border-color: var(--blood-red); color: #ff8a9f; background: rgba(201, 59, 78, 0.1); text-shadow: 0 0 5px rgba(201, 59, 78, 0.5); }

/* HUD 右侧 */
.hud-right { display: flex; justify-content: flex-end; align-items: center; gap: 20px; width: 30%; }
.hud-world-info { display: flex; flex-direction: column; align-items: flex-end; font-size: 12px; opacity: 0.9; }
.hud-loc { color: var(--dark-gold); font-weight: 900; font-size: 15px; letter-spacing: 1px; }
.nav-buttons { display: flex; gap: 10px; }
.nav-btn {
  width: 48px; height: 48px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1);
  color: var(--mythril); cursor: pointer; transition: all 0.2s;
  clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%);
  display: flex; justify-content: center; align-items: center;
}
.nav-btn svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2; }
.nav-btn:hover { border-color: var(--holo-cyan); color: var(--holo-cyan); background: rgba(0,243,255,0.1); }

/* =========================================
   💻 Level 1: 模态矩阵弹窗 (Modal)
   ========================================= */
#dragon-modal-mask {
  position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
  z-index: var(--z-modal); display: none; justify-content: center; align-items: center;
}
#dragon-modal-mask.open { display: flex; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

.dragon-modal-panel {
  width: 92vw; max-width: 1400px; height: 85vh;
  display: flex; position: relative;
}

/* 左侧侧边栏 */
.modal-sidebar {
  width: 80px; background: rgba(10, 15, 26, 0.9); border-right: 2px solid rgba(0, 243, 255, 0.2);
  display: flex; flex-direction: column; align-items: center; padding-top: 30px; gap: 20px;
  box-shadow: 10px 0 30px rgba(0,0,0,0.5);
  z-index: 2;
}
.sidebar-btn {
  width: 50px; height: 50px; background: transparent; border: 1px solid transparent; color: rgba(255,255,255,0.5);
  cursor: pointer; transition: all 0.3s; display: flex; justify-content: center; align-items: center;
  border-radius: 12px;
}
.sidebar-btn svg { width: 28px; height: 28px; fill: none; stroke: currentColor; stroke-width: 1.5; }
.sidebar-btn:hover { color: #fff; background: rgba(255,255,255,0.05); }
.sidebar-btn.active {
  border-color: var(--holo-cyan); color: var(--holo-cyan); background: rgba(0, 243, 255, 0.1);
  box-shadow: 0 0 15px rgba(0,243,255,0.3), inset 0 0 10px rgba(0,243,255,0.2);
}

/* 右侧内容区 */
.modal-content-wrapper {
  flex: 1; position: relative; background: var(--obsidian-light);
}
.modal-content-area {
  position: absolute; inset: 0; padding: 40px; overflow-y: auto;
}

.close-modal-btn {
  position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
  color: var(--mythril); width: 40px; height: 40px; cursor: pointer; z-index: 10;
  clip-path: polygon(20% 0%, 80% 0%, 100% 20%, 100% 80%, 80% 100%, 20% 100%, 0% 80%, 0% 20%);
  display: flex; justify-content: center; align-items: center; font-size: 18px;
  transition: all 0.2s;
}
.close-modal-btn:hover { background: rgba(201, 59, 78, 0.2); border-color: var(--blood-red); color: #ff8a9f; }

/* 内容区排版 */
.page-header {
  font-size: 24px; font-weight: 900; color: var(--mythril); margin-bottom: 30px;
  display: flex; align-items: center; gap: 15px;
  text-transform: uppercase; letter-spacing: 3px;
}
.page-header::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, rgba(255,255,255,0.2), transparent); }
</style>

  <div id="dragon-modal-mask">
    <div class="dragon-modal-panel tech-panel bg-dragon-scale" style="padding:0; border:none; clip-path:none;">
      <!-- 左侧路由侧边栏 -->

<script type="module">
const $ = window.jQuery || window.$;
const _ = window._;

class DragonEngine {
  constructor() {
    this.playerChar = '';
    this.data = {};
    this.init();
  }

  async init() {
    if (typeof waitGlobalInitialized === 'function') await waitGlobalInitialized('Mvu');
    this.bindEvents();
    this.updateData();
    if (window.eventOn && window.Mvu && window.Mvu.events) {
      window.eventOn(window.Mvu.events.VARIABLE_UPDATE_ENDED, () => this.updateData());
    }
  }

  updateData() {
    const allVars = (typeof getAllVariables === 'function') ? getAllVariables() : {};
    this.data = _.get(allVars, 'stat_data.sd', {});
    const chars = this.data.char || {};
    this.playerChar = Object.keys(chars).find(name => chars[name].is_player) || Object.keys(chars)[0];
    this.renderHUD();
    
    if ($('#dragon-modal-mask').hasClass('open')) {
      const activeTab = $('.sidebar-btn.active').data('tab') || 'char';
      this.renderModal(activeTab);
    }
  }

  renderHUD() {
    if (!this.playerChar || !this.data.char[this.playerChar]) return;
    const char = this.data.char[this.playerChar];
    const stat = char.stat || {};
    const status = char.status || {};
    const world = this.data.world || {};

    $('#hud-lv').text('Lv.' + (stat.lv || 0));
    $('#bar-vit').css('width', Math.min(100, (stat.vit / (stat.vit_max||1)) * 100) + '%');
    $('#bar-sp').css('width', Math.min(100, (stat.sp / (stat.sp_max||1)) * 100) + '%');
    $('#bar-men').css('width', Math.min(100, (stat.men / (stat.men_max||1)) * 100) + '%');

    const locName = status.loc || '未知坐标';
    $('#hud-loc').text(locName);
    $('#hud-time').text(_.get(world, 'time.calendar', '时空乱流'));

    const $dynamicBtn = $('#btn-context-dynamic');
    const locData = _.get(world, `locations["${locName}"]`, {});
    
    if (locData.stores && Object.keys(locData.stores).length > 0) {
      $dynamicBtn.html('🏪 访问商铺').removeClass('blood').addClass('highlight').show().off('click').on('click', () => window.triggerAction('进入商铺'));
    } else if (/森林|海|深渊|山脉|荒野/.test(locName)) {
      $dynamicBtn.html('⚔️ 猎杀魂兽').removeClass('highlight').addClass('blood').show().off('click').on('click', () => window.triggerAction('寻找魂兽'));
    } else if (locName.includes('锻造师协会')) {
      $dynamicBtn.html('🔨 借用锻造台').removeClass('blood highlight').show().off('click').on('click', () => window.triggerAction('开始锻造'));
    } else {
      $dynamicBtn.hide(); 
    }
  }

  bindEvents() {
    const self = this;
    $('.sidebar-btn').on('click', function() {
      $('.sidebar-btn').removeClass('active');
      $(this).addClass('active');
      self.renderModal($(this).data('tab'));
    });
    $('#dragon-modal-mask').on('click', function(e) {
      if (e.target === this) $(this).removeClass('open');
    });
  }

  renderModal(tab) {
    const char = this.data.char[this.playerChar] || {};
    const $t = $('#modal-render-target');
    
    const row = (label, val, c='') => `<div class="card-row"><span class="card-label">${label}</span><span class="card-val ${c}">${val!==undefined?val:'无'}</span></div>`;
    
    const getAgeC = (age) => { if(age>=1000000)return 'gold'; if(age>=100000)return 'red'; if(age>=10000)return 'black'; if(age>=1000)return 'purple'; if(age>=100)return 'yellow'; return 'white'; };

    if (tab === 'char') {
      const stat = char.stat || {};
      const blood = char.bloodline_power || {};
      const energy = char.energy?.core || {};
      const conds = stat.conditions || {};
      
      let condH = '';
      Object.keys(conds).forEach(k => { condH += `<span class="chip ${conds[k].类型==='debuff'?'debuff':''}" title="${conds[k].描述}">${k} x${conds[k].层数}</span>`; });

      $t.html(`
        <div class="page-header"><span style="color:var(--holo-cyan);">🧬 个体扫描档案</span> <span style="font-size:16px;color:#fff;">${this.playerChar}</span></div>
        <div class="data-grid">
          <div class="info-card tech-panel">
            <div class="card-title">核心面板</div>
            ${row('当前修为', `Lv.${stat.lv||0}`, 'gold')}
            ${row('年龄', stat.age)}
            ${row('魂师系别', stat.type, 'cyan')}
            ${row('天赋梯队', stat.talent_tier)}
            ${row('精神境界', stat.men_realm, 'purple')}
            <div style="height:10px;"></div>
            ${row('力量 (STR)', stat.str||0)}
            ${row('防御 (DEF)', stat.def||0)}
            ${row('敏捷 (AGI)', stat.agi||0)}
          </div>
          <div class="info-card blood tech-panel">
            <div class="card-title">血脉与魂核引擎</div>
            ${row('核心血脉', blood.bloodline||'未觉醒', 'blood')}
            ${row('封印解除', `${blood.seal_lv||0} 层`)}
            ${row('气血魂核', blood.core||'未凝聚', 'gold')}
            ${row('生命之火', blood.life_fire?'燃烧中':'熄灭', blood.life_fire?'blood':'')}
            <div style="height:10px;"></div>
            ${row('魂力魂核数量', energy.数量||0, 'cyan')}
            ${row('核心凝聚进度', `${energy.progress||0}%`)}
          </div>
          <div class="info-card spirit tech-panel">
            <div class="card-title">异常与状态监控</div>
            <div class="chip-array">${condH || '<span style="color:#666;">系统未检测到异常</span>'}</div>
          </div>
        </div>
      `);
    } else if (tab === 'spirit') {
      const spirits = char.spirit || {};
      const bones = char.soul_bone || {};
      
      let spH = '';
      Object.keys(spirits).forEach(sk => {
        const sp = spirits[sk];
        const souls = sp.soul_spirits || {};
        let orbitH = '';
        let idx = 0;
        Object.values(souls).forEach(sl => {
          Object.values(sl.rings||{}).forEach(rg => {
            const c = getAgeC(rg.年限);
            // 动态生成3D星轨环
            const size = 60 + idx * 30;
            const duration = 5 + idx * 2;
            orbitH += `<div class="orbit-ring ring-${c}" style="width:${size}px; height:${size}px; animation-duration:${duration}s;" title="${rg.颜色} ${rg.年限}年"></div>`;
            idx++;
          });
        });

        spH += `
          <div class="info-card spirit tech-panel" style="display:flex; gap:20px; align-items:center;">
            <div style="flex:1;">
              <div class="card-title">${sp.表象名称||sk}</div>
              ${row('系别', sp.type)} ${row('元素倾向', sp.element, 'cyan')}
              <div style="margin-top:15px; font-size:12px; color:#888;">附着魂灵: ${Object.keys(souls).join(', ')||'无'}</div>
            </div>
            <div class="orbit-container">
              <div class="orbit-center"></div>
              ${orbitH}
            </div>
          </div>
        `;
      });

      let bnH = '';
      ['头部魂骨','躯干魂骨','左臂魂骨','右臂魂骨','左腿魂骨','右腿魂骨'].forEach(bp => {
        const b = bones[bp];
        if (b && b.年限 > 0) bnH += row(bp.replace('魂骨',''), `${b.名称} (${b.年限}年)`, getAgeC(b.年限));
        else bnH += row(bp.replace('魂骨',''), '空置');
      });

      $t.html(`
        <div class="page-header"><span style="color:var(--soul-purple);">🔮 武魂阵列与骨架</span></div>
        <div class="data-grid">
          ${spH || '<div class="info-card tech-panel">暂无武魂</div>'}
          <div class="info-card gold tech-panel">
            <div class="card-title">外挂魂骨图谱</div>
            ${bnH}
          </div>
        </div>
      `);
    } else if (tab === 'equip') {
      const armor = char.equip?.armor || {};
      const mech = char.equip?.mech || {};
      const inv = char.inventory || {};
      const jobs = char.job || {};

      let invH = '';
      Object.keys(inv).forEach(ik => {
        const isLeg = inv[ik].品质 === '极品' || ik.includes('神级');
        invH += `<div class="hex-item ${isLeg?'legendary':''}" title="${inv[ik].描述||'无描述'}"><span>${ik.substring(0,4)}</span><span class="hex-count">x${inv[ik].数量||1}</span></div>`;
      });

      let jobH = '';
      Object.keys(jobs).forEach(jk => { jobH += `<span class="chip tech">${jk} Lv.${jobs[jk].lv||0}</span>`; });

      $t.html(`
        <div class="page-header"><span style="color:var(--holo-cyan);">⚙️ 武装与随身工坊</span></div>
        <div class="data-grid">
          <div class="info-card tech-panel" style="grid-row: span 2;">
            <div class="card-title">机甲与斗铠蓝图</div>
            <div style="color:var(--holo-cyan); font-weight:bold; margin-bottom:8px;">▼ ${armor.name || '未命名斗铠'}</div>
            ${row('斗铠等级', armor.lv ? `${armor.lv}字斗铠` : '无', 'gold')}
            ${row('核心材质', armor.material)} ${row('专属领域', armor.domain, 'purple')}
            <div style="height:20px;"></div>
            <div style="color:var(--holo-cyan); font-weight:bold; margin-bottom:8px;">▼ 随身机甲</div>
            ${row('机甲级别', mech.lv, 'cyan')} ${row('主武器', mech.weapon)}
            ${row('战损状态', mech.status, mech.status!=='完好'?'blood':'')}
          </div>
          <div class="info-card tech-panel">
            <div class="card-title">副职业资质</div>
            <div class="chip-array">${jobH||'<span style="color:#666;">无</span>'}</div>
          </div>
          <div class="info-card gold tech-panel">
            <div class="card-title">空间储物蜂窝网络</div>
            <div class="hex-grid">${invH||'<div style="color:#666;">空空如也</div>'}</div>
          </div>
        </div>
      `);
    } else if (tab === 'world') {
      const world = this.data.world || {};
      const orgs = this.data.org || {};
      
      let rankH = '';
      const topYouth = world.rankings?.youth_talent?.top30 || {};
      Object.keys(topYouth).slice(0, 5).forEach(k => { rankH += row(`No.${k} ${topYouth[k].角色名}`, `${topYouth[k].评分}分`, 'gold'); });

      let orgH = '';
      Object.keys(orgs).forEach(ok => {
        orgH += row(ok, `极:${orgs[ok].power_stats?.limit_douluo||0} 超:${orgs[ok].power_stats?.super_douluo||0} 封:${orgs[ok].power_stats?.title_douluo||0}`, 'cyan');
      });

      $t.html(`
        <div class="page-header"><span style="color:var(--dark-gold);">🌐 权御沙盘与世界观测</span></div>
        <div class="data-grid">
          <div class="info-card gold tech-panel">
            <div class="card-title">世界线监控</div>
            ${row('当前刻度', world.time?.tick||0, 'cyan')}
            ${row('时空偏差值', world.deviation||0, 'blood')}
            ${row('森林激怒值', world.forest_killed_age||0, 'blood')}
          </div>
          <div class="info-card spirit tech-panel">
            <div class="card-title">少年天才榜 (Top 5)</div>
            ${rankH || '<div style="color:#666;">榜单未生成</div>'}
          </div>
          <div class="info-card blood tech-panel" style="grid-column: 1 / -1;">
            <div class="card-title">各大势力高端战力探明</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:0 40px;">${orgH}</div>
          </div>
        </div>
      `);
    }
  }
}

window.triggerAction = function(act) {
  if (typeof triggerSlash === 'function') {
    triggerSlash(`/send [UI系统指令：玩家请求 '${act}'，请推演剧情并更新变量。]|/trigger`);
    if (window.toastr) window.toastr.success(`指令 [${act}] 已发送至神经元`, '系统提示');
  } else {
    alert(`模拟触发动作：${act}`);
  }
};

if (typeof errorCatched === 'function') { $(errorCatched(() => new DragonEngine())); }
else { $(() => new DragonEngine()); }
</script>
