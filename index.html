<script>
  // =========================================
  //  核心渲染引擎 (Dragon HUD Engine)
  // =========================================
  (function() {
    const HUD = {
      sd: {},
      activeChar: '',
      
      init() {
        // 初始化入口
        this.bindEvents();
        this.refreshData();
        this.renderEntryCard();
        
        // 监听酒馆 MVU 更新事件
        if (typeof eventOn === 'function' && window.Mvu?.events?.VARIABLE_UPDATE_ENDED) {
          eventOn(window.Mvu.events.VARIABLE_UPDATE_ENDED, () => {
            this.refreshData();
            this.renderEntryCard();
            if(document.getElementById('hud-overlay').classList.contains('is-active')) {
              this.renderViewport();
            }
          });
        }
      },

      refreshData() {
        // 通过酒馆全局函数获取数据
        if (typeof getAllVariables === 'function') {
          const vars = getAllVariables();
          this.sd = (vars && vars.stat_data && vars.stat_data.sd) ? vars.stat_data.sd : {};
        }
        
        // 智能锚定主角
        const chars = this.sd.char || {};
        this.activeChar = '';
        for (let k in chars) { if (chars[k].is_player) { this.activeChar = k; break; } }
        if (!this.activeChar) this.activeChar = chars['主角'] ? '主角' : (chars['USER'] ? 'USER' : Object.keys(chars)[0]);
      },

      // 工具函数
      safe(val, fb='N/A') { return (val === undefined || val === null || val === '') ? fb : val; },
      kv(k, v, color='var(--c-text-main)') { return `<div class="kv-item"><span class="kv-key">${k}</span><span class="kv-val" style="color:${color}">${v}</span></div>`; },
      tag(txt, type='norm') { return `<span class="tag tag-${type}">${txt}</span>`; },

      getRingClass(color, year) {
        if(color?.includes('金')) return 'color-gold';
        if(color?.includes('橙') || year>=1000000) return 'color-orange';
        if(color?.includes('红') || year>=100000) return 'color-red';
        if(color?.includes('黑') || year>=10000) return 'color-black';
        if(color?.includes('紫') || year>=1000) return 'color-purple';
        if(color?.includes('黄') || year>=100) return 'color-yellow';
        return 'color-white';
      },

      bindEvents() {
        // 入口点击打开面板
        document.getElementById('hud-entry').addEventListener('click', () => {
          this.refreshData();
          document.getElementById('hud-char-name').innerText = this.activeChar || 'UNKNOWN';
          document.getElementById('hud-world-time').innerText = `ERA: ${this.sd.world?.time?.calendar || '00.00.00'}`;
          document.getElementById('hud-overlay').classList.add('is-active');
          
          // 默认触发第一项
          document.querySelector('.nav-item[data-target="home"]').click();
        });

        // 关闭面板
        document.getElementById('btn-close-hud').addEventListener('click', () => {
          document.getElementById('hud-overlay').classList.remove('is-active');
        });

        // 侧边栏切换
        document.querySelectorAll('.nav-item').forEach(btn => {
          btn.addEventListener('click', (e) => {
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            const target = e.currentTarget;
            target.classList.add('active');
            this.renderViewport(target.getAttribute('data-target'));
          });
        });

        // 事件委托：星网工坊表单提交
        document.getElementById('hud-content').addEventListener('click', (e) => {
          if (e.target && e.target.id === 'btn-forge-submit') {
            this.submitForgeRequest();
          }
        });
      },

      // 渲染常驻入口
      renderEntryCard() {
        if(!this.activeChar) return;
        const c = this.sd.char[this.activeChar];
        const s = c.stat || {};
        document.getElementById('entry-name').innerText = this.activeChar;
        document.getElementById('entry-meta').innerText = `Lv.${s.lv||1} | ${s.men_realm||'凡境'}`;
        
        const hpP = Math.min(100, (s.vit||0)/(s.vit_max||1)*100);
        document.getElementById('entry-hp-fill').style.width = `${hpP}%`;
      },

      // 渲染右侧内容区
      renderViewport(targetId) {
        if(!targetId) {
           const activeBtn = document.querySelector('.nav-item.active');
           targetId = activeBtn ? activeBtn.getAttribute('data-target') : 'home';
        }
        const c = this.sd.char[this.activeChar] || {};
        let html = '';

        if (targetId === 'home') {
           const s = c.stat || {};
           let buffs = '';
           for(let k in (s.conditions||{})) {
             const v = s.conditions[k];
             buffs += this.tag(`${k} x${v.层数||1}`, v.类型==='debuff'?'debuff':'buff');
           }

           html = `
             <div class="grid-2">
               <div class="cyber-box">
                 <div class="box-title">PHYSICAL & ENERGY <span>机能监控</span></div>
                 
                 <div class="skew-bar-wrap">
                   <div class="skew-bar-info"><span>VIT.气血</span><span>${s.vit||0}/${s.vit_max||1}</span></div>
                   <div class="skew-bar-bg"><div class="skew-bar-fill bg-hp" style="width:${Math.min(100,(s.vit||0)/(s.vit_max||1)*100)}%"></div></div>
                 </div>
                 <div class="skew-bar-wrap">
                   <div class="skew-bar-info"><span>SP.魂力</span><span>${s.sp||0}/${s.sp_max||1}</span></div>
                   <div class="skew-bar-bg"><div class="skew-bar-fill bg-sp" style="width:${Math.min(100,(s.sp||0)/(s.sp_max||1)*100)}%"></div></div>
                 </div>
                 <div class="skew-bar-wrap">
                   <div class="skew-bar-info"><span>MEN.精神</span><span>${s.men||0}/${s.men_max||1}</span></div>
                   <div class="skew-bar-bg"><div class="skew-bar-fill bg-men" style="width:${Math.min(100,(s.men||0)/(s.men_max||1)*100)}%"></div></div>
                 </div>

                 <div class="grid-3" style="margin-top:20px;">
                    <div class="hex-stat"><div class="hex-v">${s.str||0}</div><div class="hex-k">STR.力量</div></div>
                    <div class="hex-stat"><div class="hex-v">${s.def||0}</div><div class="hex-k">DEF.防御</div></div>
                    <div class="hex-stat"><div class="hex-v">${s.agi||0}</div><div class="hex-k">AGI.敏捷</div></div>
                 </div>
               </div>

               <div class="cyber-box">
                 <div class="box-title">IDENTITY & STATUS <span>身份与状态</span></div>
                 ${this.kv('骨龄 Age', s.age||'N/A')}
                 ${this.kv('天赋评级', s.talent_tier||'N/A')}
                 ${this.kv('先天魂力', s.innate_sp_lv||0, 'var(--c-cyan)')}
                 ${this.kv('躯体伤势', c.status?.wound||'无', c.status?.wound==='无'?'#00E676':'var(--c-red)')}
                 ${this.kv('活跃领域', c.status?.active_domain||'无', 'var(--c-purple)')}
                 ${this.kv('魂核引擎', `共 ${c.energy?.core?.数量||0} 颗 (进度 ${c.energy?.core?.progress||0}%)`, 'var(--c-gold)')}
                 
                 <div class="box-title" style="margin-top:20px; border:none;">ACTIVE CONDITIONS <span>异常阵列</span></div>
                 <div class="tags">${buffs || this.tag('躯体扫描正常', 'norm')}</div>
               </div>
             </div>
           `;
        }
        else if (targetId === 'combat') {
           // 武魂与魂环
           let spHtml = '';
           for(let k in (c.spirit||{})) {
             const sp = c.spirit[k];
             spHtml += `<div class="cyber-box wide">
               <div class="box-title">SPIRIT MATRIX <span>武魂: ${sp.表象名称||k} (${sp.element||'无属性'})</span></div>`;
             for(let sName in (sp.soul_spirits||{})) {
                const ss = sp.soul_spirits[sName];
                spHtml += `<div style="margin-bottom:15px;">
                  <div style="font-size:13px;color:var(--c-text-mut);">${ss.表象名称||sName} (${ss.年限||0}年魂灵)</div>
                  <div class="ring-orbit-container">`;
                for(let rId in (ss.rings||{})) {
                   const r = ss.rings[rId];
                   const ringColor = r.颜色||'白';
                   const rCls = this.getRingClass(ringColor, r.年限);
                   const skName = Object.keys(r.魂技||{})[0] || '未定魂技';
                   const sk = r.魂技?.[skName] || {};
                   
                   // 魂环与技能组合块
                   spHtml += `
                     <div style="background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.05); border-radius:8px; padding:10px; width: 100%; display:flex; gap:15px; align-items:center;">
                       <div class="ring-core">
                         <div class="ring-orb ${rCls}">${ringColor[0]}</div>
                         <div class="ring-detail">
                           <div class="ring-id">${rId}环</div><div class="ring-age">${r.年限||0}年</div>
                         </div>
                       </div>
                       <div style="flex:1; border-left:2px solid var(--c-cyan); padding-left:15px;">
                         <div style="font-weight:bold; color:#fff; font-size:14px; margin-bottom:4px;">${skName} ${this.tag(sk.技能类型||'未知','norm')}</div>
                         <div style="font-size:11px; color:var(--c-text-mut); line-height:1.5;">
                            消耗: <span style="color:var(--c-cyan)">${sk.消耗||'无'}</span> | 加成: ${sk.加成属性||'无'} <br/>
                            <span style="color:#fff;">${sk.特效量化参数||sk.画面描述||'缺少数据录入'}</span>
                         </div>
                       </div>
                     </div>
                   `;
                }
                spHtml += `</div></div>`;
             }
             spHtml += `</div>`;
           }

           // 血脉
           const bl = c.bloodline_power || {};
           if(bl.bloodline && bl.bloodline !== '无') {
             let blTags = '';
             for(let k in (bl.skills||{})) blTags += this.tag(k, 'gold');
             for(let k in (bl.blood_rings||{})) blTags += this.tag(`气血${k}环 (${bl.blood_rings[k].颜色})`, 'debuff');

             spHtml = `
               <div class="cyber-box wide gold" style="margin-bottom:20px;">
                 <div class="box-title gold">DRAGON BLOODLINE <span>古龙血脉: ${bl.bloodline}</span></div>
                 <div class="grid-3">
                   ${this.kv('破封层数', `${bl.seal_lv||0} 阶`)}
                   ${this.kv('血脉魂核', bl.core||'未凝聚')}
                   ${this.kv('生命之火', bl.life_fire?'燃烧中':'未点燃', bl.life_fire?'var(--c-red)':'#fff')}
                 </div>
                 <div class="tags" style="margin-top:10px;">${blTags}</div>
               </div>
             ` + spHtml;
           }

           html = spHtml;
        }
        else if (targetId === 'equip') {
           const eq = c.equip || {};
           const inv = c.inventory || {};
           
           let invHtml = '';
           for(let k in inv) {
             const v = inv[k];
             invHtml += `<div style="background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.05); padding:10px; border-radius:6px;">
               <div style="font-size:13px; font-weight:bold; color:#fff;">${k} <span style="float:right; color:var(--c-cyan)">x${v.数量||1}</span></div>
               <div style="font-size:11px; color:var(--c-text-mut); margin-top:4px;">${v.品质||'常规'} | ${v.类型||'杂项'}</div>
             </div>`;
           }

           html = `
             <div class="grid-2">
               <div class="cyber-box">
                 <div class="box-title">MECH & WEAPON <span>外骨骼终端</span></div>
                 <div style="margin-bottom:15px; border-bottom:1px dashed rgba(255,255,255,0.1); padding-bottom:10px;">
                    <div style="color:var(--c-gold); font-weight:bold; margin-bottom:8px;">本命武器: ${eq.wpn?.name||'无'} (${eq.wpn?.tier||'无阶'})</div>
                    <div class="tags">${Object.keys(eq.wpn?.traits||{}).map(k=>this.tag(k,'debuff')).join('')||this.tag('无绝对特性')}</div>
                 </div>
                 <div>
                    <div style="color:var(--c-cyan); font-weight:bold; margin-bottom:8px;">机甲终端: ${eq.mech?.type||'无'} (${eq.mech?.lv||'无级'})</div>
                    ${this.kv('主武器', eq.mech?.weapon||'无')}
                    ${this.kv('战损状态', eq.mech?.status||'完好', eq.mech?.status==='重创'?'var(--c-red)':'#00E676')}
                 </div>
               </div>
               <div class="cyber-box">
                 <div class="box-title">ARMOR SYSTEM <span>斗铠系统</span></div>
                 <div style="font-size:16px; font-weight:bold; color:#fff; margin-bottom:8px;">${eq.armor?.name||'未着装'} <span style="font-size:12px;color:var(--c-cyan)">${eq.armor?.lv||0}阶</span></div>
                 ${this.kv('穿戴状态', eq.armor?.equip_status||'未装备', eq.armor?.equip_status==='已装备'?'#00E676':'#fff')}
                 ${this.kv('附带领域', eq.armor?.domain||'无', 'var(--c-purple)')}
                 ${this.kv('核心金属', eq.armor?.material||'无')}
                 <div class="tags" style="margin-top:10px;">
                   ${Object.entries(eq.armor?.parts||{}).filter(([k,v])=>v.状态!=='未打造').map(([k,v])=>this.tag(k,'cyan')).join('') || this.tag('暂无部件激活')}
                 </div>
               </div>
             </div>
             <div class="cyber-box wide">
               <div class="box-title">FOLDING CABIN <span>储物空间折叠舱</span></div>
               <div class="grid-3">${invHtml || '<div style="color:var(--c-text-mut); font-size:12px;">空间内部空空如也</div>'}</div>
             </div>
           `;
        }
        else if (targetId === 'forge') {
           const jobs = c.job || {};
           let jHtml = '';
           for(let k in jobs) {
             jHtml += `${this.kv(k, `Lv.${jobs[k].lv||0} (胜率:${jobs[k].limits?.success_rate||0}%)`, 'var(--c-gold)')}`
           }

           let matOpts = '<option value="">[请通过神经元接驳选择...]</option>';
           for(let k in (c.inventory||{})) {
             if(c.inventory[k].类型 === '材料' || k.includes('金属')) {
                matOpts += `<option value="${k}">${k} (持有量: ${c.inventory[k].数量||0})</option>`;
             }
           }

           html = `
             <div class="grid-2">
               <div class="cyber-box">
                 <div class="box-title">LICENSE <span>副职执照</span></div>
                 <div class="kv-list">${jHtml || '<span style="color:#64748b;font-size:12px;">未考取认证</span>'}</div>
               </div>
               <div class="cyber-box gold">
                 <div class="box-title gold">FUNDS <span>联邦资产</span></div>
                 <div class="kv-list">
                   ${this.kv('联邦币', this.sd.char[this.activeChar]?.wealth?.fed_coin||0, 'var(--c-gold)')}
                   ${this.kv('唐门积分', this.sd.char[this.activeChar]?.wealth?.tang_pt||0, 'var(--c-cyan)')}
                   ${this.kv('血神功勋', this.sd.char[this.activeChar]?.wealth?.blood_pt||0, 'var(--c-red)')}
                 </div>
               </div>
             </div>

             <div class="cyber-box wide">
               <div class="box-title">STAR-NET FORGE <span>星网工坊控制台</span></div>
               <div style="font-size:12px; color:var(--c-text-mut); line-height:1.6;">
                 WARNING: 任何实体物质的锻造与重塑，均需经过世界意志(AI)的仲裁计算。请在下方输入参数，系统将打包指令注入量子通讯信道。
               </div>
               <div class="f-grid">
                 <div class="f-item">
                   <label class="f-lbl">// SELECT JOB 挂载职业</label>
                   <select class="f-input" id="f-job">
                     <option value="锻造师">锻造师 Blacksmith</option><option value="设计师">设计师 Designer</option>
                     <option value="制造师">制造师 Maker</option><option value="修理师">修理师 Fixer</option>
                   </select>
                 </div>
                 <div class="f-item">
                   <label class="f-lbl">// EXTRACT MAT 提取核心材料</label>
                   <select class="f-input" id="f-mat">${matOpts}</select>
                 </div>
                 <div class="f-item" style="grid-column: 1/-1">
                   <label class="f-lbl">// TARGET SPEC 设定目标产物结构</label>
                   <input type="text" class="f-input" id="f-tar" placeholder="输入蓝图名称 (e.g. 千锻沉银 / 一字斗铠胸甲)">
                 </div>
                 <div class="f-item" style="grid-column: 1/-1">
                   <label class="f-lbl">// AMOUNT 能量/材料消耗倍率</label>
                   <input type="number" class="f-input" id="f-num" value="1">
                 </div>
                 <button class="f-submit" id="btn-forge-submit">EXECUTE // 注入魂力</button>
               </div>
             </div>
           `;
        }
        else if (targetId === 'world') {
           const w = this.sd.world || {};
           const sys = this.sd.sys || {};
           
           html = `
             <div class="grid-2">
               <div class="cyber-box">
                 <div class="box-title">TIME & ENVIRONMENT <span>时空信标</span></div>
                 <div style="font-size:24px; color:var(--c-cyan); font-family:monospace; font-weight:900; margin-bottom:15px; text-shadow:var(--glow-cyan);">${w.time?.calendar||'UNKNOWN ERA'}</div>
                 <div class="kv-list">
                   ${this.kv('绝对刻度 TICK', w.time?.tick||0)}
                   ${this.kv('世界线偏差 DEVIATION', w.deviation||0, 'var(--c-red)')}
                   ${this.kv('星斗怨气累积(引发兽潮)', `${w.forest_killed_age||0} Yrs`, 'var(--c-purple)')}
                 </div>
               </div>
               <div class="cyber-box red">
                 <div class="box-title red">BROADCAST <span>全域系统广播</span></div>
                 <div style="padding:15px; background:rgba(255,0,60,0.1); border:1px solid rgba(255,0,60,0.3); border-radius:6px; color:#fff; font-size:13px; line-height:1.6;">
                   > ${sys.rsn || '监控网络一切正常。'}
                 </div>
               </div>
             </div>
             <div class="cyber-box wide">
               <div class="box-title">GLOBAL RANKINGS <span>星网天机大盘</span></div>
               <div class="grid-3">
                 <div class="data-block">
                   <div class="d-title">少年天才榜</div>
                   <div style="font-size:20px; font-weight:bold; color:#fff;">${Object.keys(w.rankings?.youth_talent?.top30||{}).length} <span style="font-size:12px;color:var(--c-text-mut)">人在榜</span></div>
                 </div>
                 <div class="data-block">
                   <div class="d-title">大陆风云榜</div>
                   <div style="font-size:20px; font-weight:bold; color:#fff;">${Object.keys(w.rankings?.continent_wind?.top100||{}).length} <span style="font-size:12px;color:var(--c-text-mut)">人在榜</span></div>
                 </div>
                 <div class="data-block">
                   <div class="d-title" style="color:var(--c-gold)">地下拍卖行 (${w.auction?.status||'休市'})</div>
                   <div style="font-size:12px; color:#fff;">下期刷新: TICK ${w.auction?.next_tick||0}</div>
                 </div>
               </div>
             </div>
           `;
        }
        else {
           html = `<div style="color:#fff;">模块正在构建中...</div>`;
        }

        document.getElementById('hud-content').innerHTML = html;
      },

      // 执行星网工坊锻造请求
      submitForgeRequest() {
        const job = document.getElementById('f-job').value;
        const mat = document.getElementById('f-mat').value || '未指定';
        const tar = document.getElementById('f-tar').value;
        const num = document.getElementById('f-num').value;
        
        if(!tar) { alert('ERROR: 缺少目标产物定义！'); return; }
        
        const cmd = `【副职业请求】\n职业：${job}\n目标：${tar}\n材料：${mat}\n数量：${num}\n归档字段：制作请求`;
        
        const pDoc = getPortal();
        const $ta = $(pDoc).find('#send_textarea');
        const $btn = $(pDoc).find('#send_but');
        
        if($ta.length && $btn.length) {
          $ta.val(cmd).trigger('input');
          $btn.trigger('click');
          document.getElementById('hud-overlay').classList.remove('is-active');
        } else {
          alert('SYSTEM FAILURE: 无法定位量子通信信道(聊天输入框)，请手动复制以下指令：\n\n' + cmd);
        }
      }
    };

    // 页面加载完成后启动
    $(function() {
      if(typeof waitGlobalInitialized === 'function') {
        waitGlobalInitialized('Mvu').then(() => HUD.init());
      } else {
        setTimeout(() => HUD.init(), 1000);
      }
    });
  })();
</script>
